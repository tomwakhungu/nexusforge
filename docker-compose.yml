version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase-like auth simulation (local development)
  auth:
    image: supabase/gotrue:latest
    depends_on:
      - postgres
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexusforge
      GOTRUE_JWT_SECRET: super-secret-jwt-token-change-me
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000,http://localhost:3001
      GOTRUE_MAILER_AUTOCONFIRM: 'true'
    ports:
      - "9999:9999"
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:9999/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
